name: Build Linux Binary

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build binary with PyInstaller
        run: pyinstaller --onefile -n helm-mirror src/main.py

      - name: Scan binary with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: dist/helm-mirror
          format: sarif
          output: trivy-binary.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy binary scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-binary.sarif
          category: trivy-binary

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-mirror-linux-amd64
          path: dist/helm-mirror
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/helm-mirror
          generate_release_notes: true
